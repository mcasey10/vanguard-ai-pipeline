<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contextual variation dimensions — Vanguard Sell & Rebalance</title>
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f4f0;
  --color-background-info: #e6f1fb;
  --color-text-primary: #1a1a19;
  --color-text-secondary: #5f5e5a;
  --color-text-tertiary: #8f8e89;
  --color-text-info: #185fa5;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.20);
  --color-border-primary: rgba(0,0,0,0.30);
  --color-border-info: #378add;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1e1e1c;
    --color-background-secondary: #2a2a28;
    --color-background-info: #042c53;
    --color-text-primary: #e8e6de;
    --color-text-secondary: #b4b2a9;
    --color-text-tertiary: #73726c;
    --color-text-info: #85b7eb;
    --color-border-tertiary: rgba(255,255,255,0.10);
    --color-border-secondary: rgba(255,255,255,0.18);
    --color-border-primary: rgba(255,255,255,0.28);
    --color-border-info: #378add;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--color-background-secondary);color:var(--color-text-primary);padding:24px 20px 48px;max-width:900px;margin:0 auto;font-size:14px;line-height:1.6}
h1{font-size:18px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--color-text-secondary);margin-bottom:20px}
.dim-row{display:flex;gap:10px;margin-bottom:8px;align-items:stretch}
.dim-num{font-size:11px;font-weight:500;color:var(--color-text-tertiary);min-width:20px;padding-top:14px;flex-shrink:0}
.dim-card{flex:1;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;cursor:pointer;transition:border-color .15s;background:var(--color-background-primary)}
.dim-card:hover{border-color:var(--color-border-secondary)}
.dim-card.active{border-color:var(--color-border-info);background:var(--color-background-info)}
.dim-card.active .dim-title{color:var(--color-text-info)}
.dim-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.dim-poles{display:flex;gap:6px;align-items:center}
.pole{font-size:10px;color:var(--color-text-tertiary);flex:1}
.pole.right{text-align:right}
.pole-track{flex:2;height:4px;background:var(--color-border-tertiary);border-radius:2px;position:relative;overflow:visible}
.pole-dot{position:absolute;top:-3px;width:10px;height:10px;border-radius:50%;background:var(--color-text-info);transform:translateX(-50%);transition:left .4s}
.detail-box{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;background:var(--color-background-primary);margin-top:12px;min-height:100px}
.detail-head{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px}
.detail-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pole-block{font-size:11px;line-height:1.5;color:var(--color-text-primary)}
.pole-label{font-size:10px;font-weight:500;color:var(--color-text-tertiary);margin-bottom:3px}
.implication{font-size:11px;color:var(--color-text-secondary);line-height:1.5;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--color-border-tertiary)}
</style>
</head>
<body>
<h1>Contextual variation dimensions</h1>
<p class="subtitle">Vanguard Sell &amp; Rebalance — user research output · Click a dimension to explore its poles and design implications</p>

<div id="dim-list"></div>
<div class="detail-box" id="dim-detail">
  <div class="detail-head">Select a dimension above to explore its poles and design implications</div>
</div>

<script>
const dims=[
  {
    n:1,title:'Decision urgency',
    leftPole:'Low urgency',rightPole:'High urgency',
    leftDesc:'Quarterly drawdown, planned expense, year-end strategy. Amount and timing are flexible.',
    rightDesc:'Medical bill, contractor payment, time-sensitive wire. Amount fixed by external circumstances.',
    implication:'At high urgency: fastest credible path, single recommendation, minimal friction. Scenario comparison, rationale, and tax detail become obstacles. At low urgency: full feature surface earns its complexity.'
  },
  {
    n:2,title:'Withdrawal size relative to portfolio',
    leftPole:'Small',rightPole:'Large',
    leftDesc:'Marginal difference between fund selections. Outcomes are similar regardless of approach.',
    rightDesc:'Fund and lot selection materially affect both balance and tax outcome. Real tradeoffs exist.',
    implication:'Large withdrawal: optimization logic carries real weight, scenario comparison earns complexity. Small withdrawal: reassurance and simplicity — complex comparison creates cognitive overhead disproportionate to stakes.'
  },
  {
    n:3,title:'Portfolio drift from target allocation',
    leftPole:'Low drift',rightPole:'High drift',
    leftDesc:'Portfolio near target. Any fund could be drawn from without significantly worsening balance.',
    rightDesc:'Equities or bonds significantly overweight. Withdrawal is also an urgent rebalancing opportunity.',
    implication:'High drift: rebalancing logic must be foregrounded — user needs to understand why an unexpected fund is recommended. Low drift: tax dimension dominates; prominent rebalancing rationale feels like unnecessary complexity.'
  },
  {
    n:4,title:'Tax situation clarity',
    leftPole:'Low clarity',rightPole:'High clarity',
    leftDesc:'Unknown effective rate, unusual circumstances (inheritance, spousal income). Tax picture complex.',
    rightDesc:'Knows bracket, tracked YTD gains, can interpret tax impact figures as actionable inputs.',
    implication:'High clarity: tax figures are actionable decision inputs. Low clarity: same figures may confuse or mislead. Tool must not assume users possess context it cannot verify they have.'
  },
  {
    n:5,title:'Prior tool engagement',
    leftPole:'First session',rightPole:'Returning',
    leftDesc:'Unfamiliar with inputs, outputs, what "scenario comparison" means, or whether to trust recommendations.',
    rightDesc:'Knows the workflow, has expectations, may have prior scenarios as reference points.',
    implication:'Design note: this is a design dimension, not a segmentation axis. First-session needs progressive disclosure and trust signals. Returning users need efficiency. Login count is not a reliable proxy for emotional state — Segment D may be a returning user who still needs first-session treatment.'
  },
  {
    n:6,title:'Confidence in withdrawal amount',
    leftPole:'Determined',rightPole:'Exploratory',
    leftDesc:'Dollar figure is set — by a bill, budget, or RMD. Decision space is which funds, not how much.',
    rightDesc:'Open to adjusting based on what the tool reveals. May take more or less depending on tax opportunity.',
    implication:'Determined: accept fixed input, optimize around it without prompting reconsideration of the amount. Exploratory: tool can legitimately surface insights that invite amount adjustment — flagging a harvesting opportunity or a threshold that triggers a higher rate.'
  },
  {
    n:7,title:'Emotional state at session entry',
    leftPole:'Calm',rightPole:'Stressed',
    leftDesc:'Time set aside, no immediate pressure, willing to engage with complexity and learn.',
    rightDesc:'Financial anxiety, grief, family crisis, cumulative stress of a major life transition.',
    implication:'This dimension is largely invisible to the tool — no reliable behavioral signal distinguishes calm from stressed. Design implication: the tool must serve both states without requiring self-identification. No dead ends, no jargon without plain-language alternatives, always-accessible path to human support.'
  },
  {
    n:8,title:'Fund-level portfolio complexity',
    leftPole:'Low',rightPole:'High',
    leftDesc:'2–4 funds, relatively straightforward cost basis, few lots, primarily long-term positions.',
    rightDesc:'8–12 funds, layered cost basis histories, multiple lot vintages, mixed account types.',
    implication:'High complexity: tool\'s value is greatest but data presentation challenge is most acute. Progressive disclosure and intelligent summarization are essential. Low complexity: full data picture can be shown without overwhelming — user may want more detail, not less.'
  },
];

let active=null;

function render(){
  document.getElementById('dim-list').innerHTML=dims.map(d=>`
    <div class="dim-row">
      <span class="dim-num">${d.n}</span>
      <div class="dim-card${active===d.n?' active':''}" onclick="select(${d.n})">
        <div class="dim-title">${d.title}</div>
        <div class="dim-poles">
          <span class="pole">${d.leftPole}</span>
          <div class="pole-track"><div class="pole-dot" style="left:${active===d.n?'72%':'28%'}"></div></div>
          <span class="pole right">${d.rightPole}</span>
        </div>
      </div>
    </div>`).join('');
}

function select(n){
  active=active===n?null:n;
  render();
  if(!active){
    document.getElementById('dim-detail').innerHTML='<div class="detail-head">Select a dimension above to explore its poles and design implications</div>';
    return;
  }
  const d=dims.find(x=>x.n===n);
  document.getElementById('dim-detail').innerHTML=`
    <div class="detail-head">Dimension ${d.n} — ${d.title}</div>
    <div class="detail-cols">
      <div><div class="pole-label">${d.leftPole}</div><div class="pole-block">${d.leftDesc}</div></div>
      <div><div class="pole-label">${d.rightPole}</div><div class="pole-block">${d.rightDesc}</div></div>
    </div>
    <div class="implication">${d.implication}</div>
  `;
}

render();
</script>
</body>
</html>
